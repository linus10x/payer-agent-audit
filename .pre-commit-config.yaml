repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: no-commit-to-branch
        args: [--branch, main]
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.0
    hooks:
      - id: mypy
        args: [--strict, --ignore-missing-imports]
        additional_dependencies: []
        files: ^src/
  - repo: local
    hooks:
      - id: banned-term-lint
        name: banned-term-lint
        entry: python3 scripts/banned_term_lint.py
        language: system
        pass_filenames: false
        types_or: [markdown, python]
      - id: tamper-language-lint
        name: tamper-language-lint
        entry: python3 scripts/tamper_language_lint.py
        language: system
        pass_filenames: false
        types_or: [markdown, python]
